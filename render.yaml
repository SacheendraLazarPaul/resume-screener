# Render.com deployment config
# Free tier: backend sleeps after 15min inactivity (wakes in ~30s)
services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: resume-screener-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: AI_PROVIDER
        value: ""          # leave blank = auto-detect
      - key: GROQ_API_KEY
        sync: false        # fill in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: DATABASE_URL
        sync: false        # paste your Neon DB URL here
      - key: FRONTEND_URL
        sync: false        # paste your Netlify/Render frontend URL

  # ── Frontend ─────────────────────────────────────────────────
  - type: web
    name: resume-screener-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false        # paste your backend Render URL
